name: Verify

"on":
  workflow_dispatch:
    inputs:
      change_ids:
        description: "Optional comma-separated OpenSpec change ids"
        required: false
        default: ""
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
      - opt/streamline-macos-20260707

jobs:
  verify:
    # Defaults to GitHub-hosted macOS. D24 may temporarily set
    # MAFORMAC_VERIFY_RUNNER='["self-hosted","macOS","ARM64","maformac-d24"]'.
    runs-on: ${{ fromJSON(vars.MAFORMAC_VERIFY_RUNNER || '["macos-latest"]') }}
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show toolchain
        run: |
          swift --version
          python3 --version

      - name: Run source-free verification gates
        run: make verify-ci

      - name: Check whitespace
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"
          # docs/evidence-frozen/** 豁免：历史证据逐字节冻结（MANIFEST.sha256 锁 hash），清洗空白破对账（D-112 MT3）
          git diff --check "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" -- . ':(exclude)docs/evidence-frozen'

      - name: Write head-bound CI receipt
        env:
          VERIFY_CI_CHANGE_IDS: ${{ inputs.change_ids || '' }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number || '' }}
        run: |
          python3 Tools/checks/write_verify_ci_receipt.py \
            --output "$RUNNER_TEMP/verify-ci-receipt.json" \
            --change-ids "$VERIFY_CI_CHANGE_IDS"
          shasum -a 256 "$RUNNER_TEMP/verify-ci-receipt.json"

      - name: Upload CI receipt
        uses: actions/upload-artifact@v4
        with:
          name: verify-ci-receipt
          path: ${{ runner.temp }}/verify-ci-receipt.json
