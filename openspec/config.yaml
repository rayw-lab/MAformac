schema: spec-driven

# 仅注入长期稳定的项目背景与 artifact 纪律；动态路线由 CURRENT/live Git 恢复。
context: |
  MAformac 是纯端侧、完全离线的车控方案演示助手，用于现场方案演示，
  不是量产座舱、真车控制、客户侧运行产品或多租户服务。

  北极星是五分钟内听懂中文、反应快、不崩、视觉清晰、断网可演。
  车控执行端只改变 mock UI 状态并给出 TTS/readback；安全检查由代码执行，
  模型不直接执行动作，错误不得冒充成功。

  行为契约以已生效的 openspec/specs 为准；可执行语义以 contracts/source/checker 为准。
  proposal、plan、handoff 和 Memory 都不能提升 proof class。

  源料只抽象语义、架构与协议。密钥、个人数据、报价/成本、真实客户身份、
  受限原文和受限源料训练数据永不入仓；任何例外只认项目 exception registry。

rules:
  proposal:
    - 必须包含 Non-goals，并明确本次不改变的产品面和 proof ceiling
    - 成功标准必须可观察、可复算；主观体验信号与自动化 hard gate 分开
    - 车控语境必须明确为 mock state + readback，不得写成真实车辆执行
  specs:
    - 只写可观察行为，使用 Requirement SHALL/MUST 与 Scenario GIVEN/WHEN/THEN
    - 错误不得冒充成功；需要状态变化的行为以 readback 作为完成证据
    - 不复制 contracts 中的机器枚举、范围或计数，使用稳定引用
  design:
    - 明确输入、决策、安全门、mock state、readback 和 trace 的责任边界
    - 风险必须绑定具体 failure mode 与可验证缓解，不写空泛风险
    - 说明证据等级以及尚未覆盖的 runtime/device/live-api 面
  tasks:
    - 每项任务写明产出、验收标准、scope in/out 和禁止提升的 claim
    - 先跑针对性门，再按风险决定 build/integration；禁止用 agent prose 代替结果
    - closeout 必须绑定 exact subject、验证结果、proof class 与 non-claims
