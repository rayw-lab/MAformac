<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAformac · 深空辉光 · 可交互原型</title>
<style>
  :root{
    --bg0:#05060c; --ink:#eaf0ff; --dim:#7c87a8;
    --cyan:#00e5ff; --violet:#7b5cff;
    --font:-apple-system,"SF Pro Display","SF Pro Text","Helvetica Neue",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;display:flex;gap:48px;align-items:center;justify-content:center;flex-wrap:wrap;
    padding:40px;font-family:var(--font);color:var(--ink);
    background:radial-gradient(900px 600px at 20% 0%,#1a1336,transparent 60%),
               radial-gradient(900px 600px at 90% 5%,#0a2540,transparent 55%),var(--bg0)}

  /* iPhone */
  .phone{width:330px;height:680px;border-radius:50px;padding:12px;position:relative;flex:none;
    background:linear-gradient(160deg,#23262f,#0c0d12);
    box-shadow:0 50px 90px -20px rgba(0,0,0,.85),0 0 0 2px rgba(255,255,255,.04) inset}
  .notch{position:absolute;top:22px;left:50%;transform:translateX(-50%);width:104px;height:32px;background:#000;border-radius:18px;z-index:30}
  .screen{width:100%;height:100%;border-radius:39px;overflow:hidden;display:flex;flex-direction:column;
    background:radial-gradient(120% 80% at 50% 0%,#101630,#05060c);position:relative}

  .statusbar{display:flex;justify-content:space-between;align-items:center;padding:15px 22px 6px;font-size:12px;font-weight:600}
  .net{transition:color .4s} .net.off{color:#ffb13c}
  .appbar{padding:8px 22px 10px;display:flex;justify-content:space-between;align-items:flex-end}
  .appbar .ttl{font-size:20px;font-weight:800;letter-spacing:-.01em}
  .badge{font-size:10px;font-weight:700;padding:4px 9px;border-radius:20px;letter-spacing:.04em;
    background:rgba(0,229,255,.12);color:var(--cyan);border:1px solid rgba(0,229,255,.3);transition:.4s}
  .badge.off{background:rgba(255,177,60,.14);color:#ffb13c;border-color:rgba(255,177,60,.4)}

  .seats{display:flex;gap:7px;padding:2px 20px 12px}
  .seat{flex:1;text-align:center;font-size:10px;font-weight:700;padding:7px 0;border-radius:11px;
    background:rgba(255,255,255,.04);color:var(--dim);border:1px solid rgba(255,255,255,.06);transition:.45s}
  .seat.on{background:linear-gradient(135deg,rgba(123,92,255,.4),rgba(0,229,255,.25));color:#fff;
    border-color:rgba(0,229,255,.5);box-shadow:0 0 20px rgba(0,229,255,.4)}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px;align-content:start}
  .card{border-radius:16px;padding:13px;min-height:72px;display:flex;flex-direction:column;justify-content:space-between;
    background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(8px);
    cursor:pointer;transition:transform .15s, box-shadow .5s, background .5s, border-color .5s;-webkit-tap-highlight-color:transparent}
  .card:active{transform:scale(.96)}
  .card .ic{font-size:18px;color:#5f6a8c;transition:.5s}
  .card .lbl{font-size:11px;color:var(--dim);font-weight:600}
  .card .val{font-size:15px;font-weight:800;color:#5f6a8c;transition:.5s}
  .card.on{background:linear-gradient(150deg,rgba(0,229,255,.16),rgba(123,92,255,.14));border-color:rgba(0,229,255,.5);
    box-shadow:0 0 22px rgba(0,229,255,.3),0 0 40px rgba(123,92,255,.18) inset;animation:breathe 3.4s ease-in-out infinite}
  .card.on .ic{color:var(--cyan);text-shadow:0 0 14px var(--cyan)} .card.on .val{color:#fff}
  @keyframes breathe{0%,100%{box-shadow:0 0 18px rgba(0,229,255,.22),0 0 30px rgba(123,92,255,.12) inset}
    50%{box-shadow:0 0 32px rgba(0,229,255,.45),0 0 55px rgba(123,92,255,.3) inset}}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.06)}100%{transform:scale(1)}}
  .card.justlit{animation:breathe 3.4s ease-in-out infinite, pop .5s ease-out}

  .convo{flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:7px;padding:14px 20px 6px;min-height:84px}
  .msg{max-width:82%;padding:8px 12px;border-radius:14px;font-size:12.5px;line-height:1.45;opacity:0;transform:translateY(8px);animation:rise .35s ease-out forwards}
  .msg.u{align-self:flex-end;background:linear-gradient(135deg,#1aa6ff,#5f2bff);color:#fff;border-bottom-right-radius:4px}
  .msg.a{align-self:flex-start;background:rgba(255,255,255,.06);color:#cdd6f5;border:1px solid rgba(255,255,255,.08);border-bottom-left-radius:4px}
  @keyframes rise{to{opacity:1;transform:none}}
  .dots span{display:inline-block;width:5px;height:5px;margin:0 1.5px;border-radius:50%;background:var(--cyan);animation:blink 1.2s infinite}
  .dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}

  .mic{margin:6px auto 18px;width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:23px;
    background:radial-gradient(circle at 50% 35%,#1aa6ff,#5f2bff);box-shadow:0 0 30px rgba(0,170,255,.55),0 8px 20px rgba(0,0,0,.5);cursor:pointer}
  .mic.listening{animation:pulse 1.1s ease-out infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(0,229,255,.5),0 0 30px rgba(0,170,255,.55)}100%{box-shadow:0 0 0 22px rgba(0,229,255,0),0 0 30px rgba(0,170,255,.55)}}

  /* 控制台 */
  .panel{width:300px;flex:none}
  .panel .k{font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--dim);font-weight:700}
  .panel h1{font-size:26px;font-weight:800;margin:8px 0 6px;letter-spacing:-.02em;
    background:linear-gradient(92deg,#fff,var(--cyan));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .panel p{font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:20px}
  .btn{display:block;width:100%;text-align:left;margin-bottom:10px;padding:13px 15px;border-radius:14px;cursor:pointer;
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);color:var(--ink);font-family:inherit;font-size:13.5px;
    transition:transform .12s,background .3s,border-color .3s}
  .btn:hover{background:rgba(0,229,255,.08);border-color:rgba(0,229,255,.3);transform:translateX(3px)}
  .btn:active{transform:scale(.98)}
  .btn b{color:var(--cyan)} .btn small{display:block;color:var(--dim);font-size:11px;margin-top:2px;font-weight:400}
  .btn.net{background:rgba(255,177,60,.08);border-color:rgba(255,177,60,.25)} .btn.net b{color:#ffb13c}
  .hint{font-size:11.5px;color:var(--dim);margin-top:14px;line-height:1.6}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
  <!-- 控制台(模拟磊哥的演示话术触发) -->
  <div class="panel">
    <div class="k">MAformac · 深空辉光</div>
    <h1>可交互原型</h1>
    <p>点下面的「演示脚本」= 模拟你说话。也可直接点手机上的卡片亮灭。这是 demo 的 UI 骨架(纯前端模拟,未接真模型)。</p>
    <button class="btn" onclick="demo('open_ac')"><b>▶ "打开空调"</b><small>基础:明确指令,秒回</small></button>
    <button class="btn" onclick="demo('cold')"><b>▶ "我有点冷"</b><small>模糊意图 → 升温 + 座椅加热</small></button>
    <button class="btn net" onclick="toggleNet()"><b id="netbtn">✈️ 切到离线(飞行模式)</b><small>断网高潮:端侧照样懂</small></button>
    <button class="btn" onclick="demo('sleepy')"><b>▶ "我有点困了"</b><small>断网下仍工作 → 通风+按摩+氛围灯</small></button>
    <button class="btn" onclick="demo('redgirl')"><b>▶ "给副驾红衣美女开窗"</b><small>DMS 多模指代 → 副驾高亮+开窗</small></button>
    <button class="btn" onclick="demo('multi')"><b>▶ "放首歌、空调调低"</b><small>单句多意图 → 多卡片联动</small></button>
    <button class="btn" onclick="reset()" style="opacity:.7"><b>↺ 重置</b></button>
    <div class="hint">①暂选(后续可改)。选定后这套交互可直接演化成真 demo 的 UI 层。</div>
  </div>

  <!-- iPhone -->
  <div class="phone"><div class="notch"></div><div class="screen">
    <div class="statusbar"><span>9:41</span><span class="net" id="net">🌐 在线 · 100%</span></div>
    <div class="appbar"><div class="ttl">MAformac</div><div class="badge" id="badge">端侧 · 在线</div></div>
    <div class="seats">
      <div class="seat" id="s-main">主驾</div>
      <div class="seat" id="s-pass">副驾</div>
      <div class="seat" id="s-rear">后排</div>
    </div>
    <div class="grid2">
      <div class="card" id="c-ac" onclick="tog('c-ac')"><div class="ic">❄️</div><div><div class="lbl">空调</div><div class="val" id="v-ac">关</div></div></div>
      <div class="card" id="c-seat" onclick="tog('c-seat')"><div class="ic">💺</div><div><div class="lbl">座椅</div><div class="val" id="v-seat">关</div></div></div>
      <div class="card" id="c-win" onclick="tog('c-win')"><div class="ic">🪟</div><div><div class="lbl">车窗</div><div class="val" id="v-win">关</div></div></div>
      <div class="card" id="c-fan" onclick="tog('c-fan')"><div class="ic">🌬️</div><div><div class="lbl">风量</div><div class="val" id="v-fan">关</div></div></div>
      <div class="card" id="c-amb" onclick="tog('c-amb')"><div class="ic">🌈</div><div><div class="lbl">氛围灯</div><div class="val" id="v-amb">关</div></div></div>
      <div class="card" id="c-music" onclick="tog('c-music')"><div class="ic">🎵</div><div><div class="lbl">音乐</div><div class="val" id="v-music">关</div></div></div>
    </div>
    <div class="convo" id="convo"></div>
    <div class="mic" id="mic">🎤</div>
  </div></div>

<script>
  const $=id=>document.getElementById(id);
  let online=true;

  function setCard(id,on,val){
    const c=$('c-'+id); const v=$('v-'+id);
    if(on){c.classList.add('on');c.classList.add('justlit');setTimeout(()=>c.classList.remove('justlit'),520); if(val)v.textContent=val;}
    else{c.classList.remove('on'); v.textContent='关';}
  }
  function tog(cid){ const c=$(cid); c.classList.toggle('on');
    const v=c.querySelector('.val'); v.textContent=c.classList.contains('on')?(v.dataset.on||'开'):'关';
    if(c.classList.contains('on')){c.classList.add('justlit');setTimeout(()=>c.classList.remove('justlit'),520);} }

  function toggleNet(){
    online=!online;
    $('net').innerHTML=online?'🌐 在线 · 100%':'✈️ 离线 · 100%';
    $('net').classList.toggle('off',!online);
    $('badge').textContent=online?'端侧 · 在线':'端侧 · 离线运行';
    $('badge').classList.toggle('off',!online);
    $('netbtn').textContent=online?'✈️ 切到离线(飞行模式)':'🌐 切回在线';
    bubble('a', online?'已联网。':'已断网 —— 但我在本机,照样懂你。');
  }

  function bubble(role,text,typing){
    const m=document.createElement('div'); m.className='msg '+role;
    if(typing){m.innerHTML='<span class="dots"><span></span><span></span><span></span></span>';}
    else m.textContent=text;
    $('convo').appendChild(m);
    while($('convo').children.length>4)$('convo').removeChild($('convo').firstChild);
    return m;
  }

  const scripts={
    open_ac:{say:'打开空调',reply:'好的,已为你打开空调',act:()=>setCard('ac',true,'26°C')},
    cold:{say:'我有点冷',reply:'帮你升到 26°,顺手开了座椅加热 🔥',act:()=>{setCard('ac',true,'26°C');setTimeout(()=>setCard('seat',true,'2 档'),350)}},
    sleepy:{say:'我有点困了',reply:(online?'':'(离线·端侧) ')+'帮你开了通风提神、座椅按摩,调成清醒氛围灯',act:()=>{setCard('fan',true,'3 档');setTimeout(()=>setCard('seat',true,'按摩'),300);setTimeout(()=>setCard('amb',true,'清醒'),600)}},
    redgirl:{say:'给副驾穿红衣的美女开窗',reply:'DMS 识别到副驾红衣乘客,已为她打开车窗',act:()=>{$('s-pass').textContent='副驾·👗红';$('s-pass').classList.add('on');setTimeout(()=>setCard('win',true,'副驾开'),400)}},
    multi:{say:'放首歌,再把空调调低',reply:'已播放轻音乐,空调降到 22° 🎵',act:()=>{setCard('music',true,'轻音乐');setTimeout(()=>setCard('ac',true,'22°C'),350)}}
  };

  let busy=false;
  function demo(key){
    if(busy)return; busy=true;
    const s=scripts[key];
    bubble('u',s.say);
    $('mic').classList.add('listening');
    const t=bubble('a','',true);
    setTimeout(()=>{
      $('mic').classList.remove('listening');
      t.textContent=typeof s.reply==='function'?s.reply():s.reply;
      t.style.animation='rise .3s ease-out';
      s.act();
      busy=false;
    },900);
  }

  function reset(){
    ['ac','seat','win','fan','amb','music'].forEach(id=>setCard(id,false));
    $('s-pass').textContent='副驾';$('s-pass').classList.remove('on');
    $('convo').innerHTML='';
    if(!online)toggleNet();
  }
  // 数值记忆
  $('v-ac').dataset.on='26°C';$('v-seat').dataset.on='2 档';$('v-win').dataset.on='开';
  $('v-fan').dataset.on='2 档';$('v-amb').dataset.on='开';$('v-music').dataset.on='播放';
</script>
</body>
</html>
