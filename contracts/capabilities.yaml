    tool_schema:
      name: set_cabin_ambient_light
      description: 调整本地 mock 氛围灯开关和颜色。
      parameters:
        type: object
        additionalProperties: false
        properties:
          power:
            type: string
            enum:
              - on
              - off
              - unchanged
          color:
            type: string
            enum:
              - warm
              - cool
              - blue
              - amber
              - white
        required:
          - power
    reference_binding:
      vss_path: Vehicle.Cabin.Light.AmbientLight
      readable: true
      writable: true
      type: string
      unit: null
      allowed_values:
        - off
        - warm
        - cool
        - blue
        - amber
        - white
      raw_source_policy: abstracted_only
    execution:
      connector: local
      mock_behavior: update_mock_state
      state_cell: lighting.ambient
      idempotent: true
      exclusive_bus: lighting
      # Composite semantic: power:off → write "off"; power:on → write color value (or "on" if color absent);
      # power:unchanged → skip; color:absent when power:on → use color field if present.
      # ambient_composite: true signals the executor to use composite logic for this capability.
      ambient_composite: true
      state_transforms:
        - field: power
          state_cell: lighting.ambient
          unchanged_skip: true
          ambient_composite: true
    demo_guard:
      risk_level: R0
      confirm_policy: none
      writable: true
      range: {}
      enum:
        power:
          - on
          - off
          - unchanged
        color:
          - warm
          - cool
          - blue
          - amber
          - white
      preconditions: []
    response:
