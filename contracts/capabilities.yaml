capabilities:
  - id: cabin.ac
    status: active
    display_zh: 空调
    aliases:
      - 打开空调
      - 关掉空调
      - 冷气
      - 暖风
      - 制冷
      - 制热
      - 我有点冷
      - 我有点热
    tool_schema:
      name: set_cabin_ac
      description: 控制本地 mock 空调开关、温度和冷暖模式。
      parameters:
        type: object
        additionalProperties: false
        properties:
          power:
            type: string
            enum:
              - on
              - off
              - unchanged
          target_temperature:
            type: integer
            minimum: 16
            maximum: 30
          delta:
            type: string
            enum:
              - warmer
              - cooler
              - none
          mode:
            type: string
            enum:
              - auto
              - cooling
              - heating
        required:
          - power
    reference_binding:
      vss_path: Vehicle.Cabin.HVAC.IsAirConditioningActive
      readable: true
      writable: true
      type: boolean
      unit: null
      allowed_values:
        - on
        - off
      raw_source_policy: abstracted_only
    execution:
      connector: local
      mock_behavior: update_mock_state
      state_cell: hvac.ac
      related_state_cells:
        - hvac.temperature
      idempotent: true
      exclusive_bus: hvac
      # state_transforms: declarative field→state_cell mapping (multi-cell support).
      # unchanged_skip: true means skip writing this cell when field value is "unchanged".
      state_transforms:
        - field: power
          state_cell: hvac.ac
          unchanged_skip: true
        - field: target_temperature
          state_cell: hvac.temperature
          unchanged_skip: false
    demo_guard:
      risk_level: R0
      confirm_policy: none
      writable: true
      range:
        target_temperature:
          minimum: 16
          maximum: 30
      enum:
        power:
          - on
          - off
          - unchanged
        mode:
          - auto
          - cooling
          - heating
      preconditions: []
    response:
      success_readback_zh: 空调已调整为{actualValue}
      failure_fallback_zh: 空调当前无法调整
    eval_refs:
      - demo.fast_path.open_ac
      - demo.comfort.cold

