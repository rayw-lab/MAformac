      raw_source_policy: abstracted_only
    execution:
      connector: local
      mock_behavior: update_mock_state
      state_cell: seat.driver.heat
      idempotent: true
      exclusive_bus: seat_comfort
      state_transforms:
        - field: level
          state_cell: seat.driver.heat
          unchanged_skip: false
    demo_guard:
      risk_level: R0
      confirm_policy: none
      writable: true
      range:
        level:
          minimum: 0
          maximum: 3
      enum:
        position:
          - driver
          - passenger
          - all
      preconditions: []
    response:
      success_readback_zh: 座椅加热已调到{actualValue}挡
