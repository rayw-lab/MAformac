{
  "schema_version": "demo_progress_app_scenarios_v1",
  "meta": {
    "owner": "operator / 方案经理",
    "purpose": "三层字段登记：runtime_path_reachable + operator_pass（actionDemoProven 由 matrix receipt 机器派生，不手写）",
    "authority": "tracking_not_ssot",
    "non_claims": [
      "not_actionDemoProven_handwrite",
      "not_single_demoable_kpi",
      "not_operator_pass_ceremony_ssot",
      "not_c6_acceptance",
      "not_v_pass"
    ],
    "layers": {
      "actionDemoProven": "Tools/checks/check_capability_matrix.py receipt actionDemoProven_count/row_count",
      "runtime_path_reachable": "scenarios[].layers.runtime_path_reachable == true",
      "operator_pass": "scenarios[].layers.operator_pass == true AND evidence complete (operator + basis_head40 + recording/screenshot on disk)"
    },
    "count_rule": "A_den = scenarios with count_in_denominator != false; L2_num = runtime_path_reachable true; L3_num = operator_pass true + evidence_complete",
    "note": "File body is JSON-in-.yaml for zero-deps parse (json.loads). PyYAML also accepts it."
  },
  "scenarios": []
}
